{% extends "cafe/base.html" %}

{% block title %}Feedback | Craving House{% endblock %}

{% block content %}
  <section class="page-title">
    <p class="eyebrow">Customer feedback</p>
    <h1>Tell us how we did</h1>
  </section>

  <form method="post" class="panel form-panel narrow">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="button-primary">Send feedback</button>
  </form>
{% endblock %}

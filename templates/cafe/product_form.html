{% extends "cafe/base.html" %}

{% block title %}{% if product %}Edit{% else %}New{% endif %} Menu Item | Craving House{% endblock %}

{% block content %}
  <section class="page-title">
    <p class="eyebrow">Menu control</p>
    <h1>{% if product %}Edit {{ product.name }}{% else %}New menu item{% endif %}</h1>
  </section>

  <form method="post" class="panel form-panel narrow">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="button-primary">Save item</button>
  </form>
{% endblock %}

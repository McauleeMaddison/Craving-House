name: Django Quality

on:
  push:
    branches: ["main"]
    paths:
      - "cafe/**"
      - "craving_house/**"
      - "templates/**"
      - "static/django/**"
      - ".github/workflows/web-quality.yml"
      - "manage.py"
      - "requirements.txt"
  pull_request:
    paths:
      - "cafe/**"
      - "craving_house/**"
      - "templates/**"
      - "static/django/**"
      - ".github/workflows/web-quality.yml"
      - "manage.py"
      - "requirements.txt"

jobs:
  django-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Unit tests
        run: python manage.py test

      - name: Static asset collection
        run: python manage.py collectstatic --noinput
